<!DOCTYPE html>
<html>
<head>
    <title>Git Workflow Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: white;
            margin-top: 100px;
            font-size: 50px;
        }

        h2 {
            color: #f0f0f0;
            font-size: 30px;
        }

        p {
            color: #ffffff;
            font-size: 18px;
            margin-top: 10px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }
    </style>

</head>
<body>

    <h1>Hello Git!</h1>
    <h2>Learning Git is Easy!</h2>
    <p>This is my first Git project</p>

</body>
</html>
